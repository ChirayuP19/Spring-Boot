server:
  port: 8080
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000/auth-service
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 10
            redis-rate-limiter.burstCapacity: 20
      routes:
        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/accounts/**
          filters:
            - StripPrefix=1
        - id: transaction-service
          uri: lb://TRANSACTION-SERVICE
          predicates:
           - Path=/api/transactions/**
           - name: CircuitBreaker
             args:
               name: transactionCB
# eureka:
#   client:
#     service-url:
#         defaultZone: http://localhost:8761/eureka
        
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus




